[env:esp32dev]
platform = espressif32@6.7.0
board = esp32-devkitc-wroom  ; DevKitC WROOM 32 ✓
framework = arduino
monitor_speed = 115200
board_build.filesystem = spiffs
board_build.partitions = default_16MB.csv
lib_deps = 
    arduino-libraries/ArduinoBLE@^1.0.2
    ; ESP32 BLE Arduino built-in
build_flags = 
    -DARDUINO_ESP32_DEV
    -DBOARD_HAS_PSRAM
