name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:  # Manual trigger

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      with:
        path: main

    - name: Cache ESP32 tools
      uses: actions/cache@v3
      id: esp32-cache
      with:
        path: |
          ~/.arduino15/packages/esp32
          ~/.cache/arduino
        key: esp32-core-${{ hashFiles('**/platform.local.txt', '**/libraries/**') }}

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Install ESP32 Platform
      run: |
        python -m pip install -U pyserial esptool
        mkdir -p ~/.arduino15/packages
        curl -fsSL https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json -o ~/.arduino15/packages/package_esp32_index.json

    - name: Install Arduino CLI
      uses: arduino/setup-arduino-cli@v1
      with:
        version: '0.35.3'

    - name: Install ESP32 Board
      run: |
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@2.0.14

    - name: Compile ESP32 Firmware
      run: |
        arduino-cli compile --fqbn esp32:esp32:esp32dev \
          --build-properties build.memory_wrappers_tagged_regions=1 \
          ./main

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v3
      with:
        name: gmpro87-esp32-firmware
        path: |
          main/gmpro87-esp32.ino.esp32.esp32dev.bin
          main/gmpro87-esp32.ino.with_bootloader.bin

    - name: Generate Release (on push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v1
      with:
        files: |
          main/gmpro87-esp32.ino.esp32.esp32dev.bin
          main/gmpro87-esp32.ino.with_bootloader.bin
        tag_name: v${{ github.run_number }}
        name: GMpro87 ESP32 v${{ github.run_number }}
        body: |
          ## 🚀 GMpro87 ESP32 Firmware
          - **File**: `gmpro87-esp32.ino.esp32.esp32dev.bin`
          - **Flash Address**: `0x1000`
          - **Board**: ESP32 Dev Module
          
          ### Flash Instructions:
          ```bash
          esptool.py --chip esp32 --port COMX write_flash 0x1000 gmpro87-esp32.ino.esp32.esp32dev.bin
          ```
        draft: false
        prerelease: false
