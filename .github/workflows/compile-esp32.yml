name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install tools
      run: |
        pip install pyserial esptool
        # Download Arduino CLI directly
        wget https://github.com/arduino/arduino-cli/releases/download/0.35.3/arduino-cli_0.35.3_Linux_64bit.tar.gz
        tar -xzf arduino-cli_0.35.3_Linux_64bit.tar.gz
        sudo mv arduino-cli /usr/local/bin/
        arduino-cli version

    - name: Configure Arduino CLI
      run: |
        arduino-cli config init --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@2.0.17

    - name: Install libraries
      run: |
        arduino-cli lib update-index
        arduino-cli lib install "ESP32 BLE Arduino"

    - name: Compile firmware
      run: |
        mkdir -p build
        arduino-cli compile \
          --fqbn esp32:esp32:esp32dev \
          --output-dir build \
          --export-binaries \
          ./

    - name: Verify build
      run: |
        ls -la build/
        file build/*.bin 2>/dev/null || echo "No .bin files"

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: gmpro87-esp32-${{ github.run_number }}
        path: |
          build/*.bin
          build/*.elf
        if-no-files-found: ignore

    - name: Release (main branch only)
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.bin
        tag_name: v${{ github.run_number }}
        name: GMpro87 ESP32 v${{ github.run_number }}
        body: |
          # GMpro87 ESP32 Firmware
          **Flash:** `esptool.py --chip esp32 write_flash 0x1000 build/*.bin`
        draft: false
