name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip pyserial esptool

    - name: Install Arduino CLI
      run: |
        curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
        sudo mv arduino-cli /usr/local/bin/
        arduino-cli version

    - name: Install ESP32 Board
      run: |
        arduino-cli config init
        arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core install esp32:esp32@2.0.17
        arduino-cli lib update-index
        arduino-cli lib install "WiFi" "ESP32 BLE Arduino"

    - name: Compile ESP32 Firmware
      run: |
        mkdir -p build
        arduino-cli compile \
          --fqbn esp32:esp32:esp32dev \
          --build-cache-path .cache \
          --output-dir ./build \
          --export-binaries \
          ./

    - name: List compiled files
      run: |
        ls -la build/
        file build/*.bin

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4
      with:
        name: gmpro87-esp32-firmware
        path: |
          build/gmpro87-esp32.ino.esp32.esp32dev.bin
          build/gmpro87-esp32.ino.esp32.esp32dev.with_bootloader.bin
        retention-days: 90

    - name: Create Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          build/gmpro87-esp32.ino.esp32.esp32dev.bin
          build/gmpro87-esp32.ino.esp32.esp32dev.with_bootloader.bin
        tag_name: v${{ github.run_number }}
        name: GMpro87 ESP32 v${{ github.run_number }}
        body: |
          # 🚀 GMpro87 ESP32 Firmware
          
          **Flash Size:** ~1.2MB  
          **Board:** ESP32 Dev Module
          
          ## 📥 Download:
          
