name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install tools
      run: |
        pip install pyserial esptool

    - name: Install Arduino CLI
      run: |
        wget https://github.com/arduino/arduino-cli/releases/latest/download/arduino-cli_latest_Linux_64bit.tar.gz
        tar -xzf arduino-cli_latest_Linux_64bit.tar.gz
        sudo mv arduino-cli /usr/local/bin/
        arduino-cli version

    - name: Setup ESP32 Platform
      run: |
        # Config Arduino CLI
        arduino-cli config init
        
        # Add ESP32 index & update
        arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        
        # Install ESP32 core
        arduino-cli core install esp32:esp32@2.0.17
        
        # List available boards
        arduino-cli board listall esp32:esp32

    - name: Install libraries
      run: |
        arduino-cli lib update-index
        arduino-cli lib install "ESP32 BLE Arduino"

    - name: Compile ESP32
      run: |
        mkdir -p build
        arduino-cli compile \
          --fqbn esp32:esp32:esp32dev \
          --build-properties build.partitions=default_8MB.csv \
          --output-dir build \
          --export-binaries \
          ./

    - name: Show results
      run: |
        find build -name "*.bin" -exec ls -lh {} \;
        file build/*.bin 2>/dev/null || echo "Build OK"

    - name: Upload firmware
      uses: actions/upload-artifact@v4
      with:
        name: gmpro87-esp32-${{ github.run_number }}
        path: |
          build/*.bin
        retention-days: 30

    - name: GitHub Release
      uses: softprops/action-gh-release@v2
      if: github.ref == 'refs/heads/main'
      with:
        files: build/*.bin
        tag_name: v${{ github.run_number }}
        name: "GMpro87 ESP32 v${{ github.run_number }}"
