name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install Python tools
      run: pip install pyserial esptool

    - name: Download Arduino CLI (Latest Stable)
      run: |
        # Get latest Arduino CLI version
        LATEST_VERSION=$(curl -s https://api.github.com/repos/arduino/arduino-cli/releases/latest | grep '"tag_name"' | sed -E 's/.*"([^"]+)".*/\1/')
        echo "Latest version: $LATEST_VERSION"
        
        # Download & install
        wget "https://github.com/arduino/arduino-cli/releases/download/${LATEST_VERSION}/arduino-cli_${LATEST_VERSION#v}_Linux_64bit.tar.gz"
        tar -xzf arduino-cli_*.tar.gz
        sudo mv arduino-cli /usr/local/bin/
        arduino-cli version

    - name: Setup Arduino CLI
      run: |
        arduino-cli config init --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@2.0.17

    - name: Install libraries
      run: |
        arduino-cli lib update-index
        arduino-cli lib install "ESP32 BLE Arduino"

    - name: Compile
      run: |
        mkdir -p build
        arduino-cli compile \
          --fqbn esp32:esp32:esp32dev \
          --output-dir build \
          --export-binaries \
          ./

    - name: Verify
      run: ls -la build/

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: firmware-${{ github.run_number }}
        path: build/*.bin

    - name: Release
      if: github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: build/*.bin
        tag_name: v${{ github.run_number }}
        name: GMpro87 v${{ github.run_number }}
