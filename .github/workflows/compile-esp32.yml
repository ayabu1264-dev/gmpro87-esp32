name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip pyserial esptool

    - name: Install Arduino CLI
      run: |
        # Download & install Arduino CLI
        curl -fsSL https://raw.githubusercontent.com/arduino/arduino-cli/master/install.sh | sh
        # Add to PATH
        echo "$PWD/bin" >> $GITHUB_PATH
        arduino-cli version

    - name: Install ESP32 Board & Libraries
      run: |
        arduino-cli config init --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@2.0.17
        arduino-cli lib update-index
        arduino-cli lib install "ESP32 BLE Arduino"

    - name: Verify ESP32 Board
      run: |
        arduino-cli board listall | grep esp32

    - name: Compile ESP32 Firmware
      run: |
        mkdir -p build cache
        arduino-cli compile \
          --fqbn esp32:esp32:esp32dev \
          --build-cache-path ./cache \
          --output-dir ./build \
          --export-binaries \
          ./

    - name: Show compiled files
      run: |
        ls -la build/
        du -sh build/*.bin

    - name: Upload Firmware
      uses: actions/upload-artifact@v4
      with:
        name: gmpro87-esp32-firmware-v${{ github.run_number }}
        path: |
          build/*.bin
        retention-days: 30

    - name: Create GitHub Release
      if: github.ref == 'refs/heads/main' && github.event_name == 'push'
      uses: softprops/action-gh-release@v2
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        files: build/*.bin
        tag_name: v${{ github.run_number }}
        name: "GMpro87 ESP32 v${{ github.run_number }}"
        body: |
          # 🎯 **GMpro87 ESP32 Firmware**
          
          **✅ Build:** #${{ github.run_number }}
          **📏 Size:** ~1.2MB
          **🎯 Board:** ESP32 Dev Module
          
          ## 📥 **Flash Files:**
          
