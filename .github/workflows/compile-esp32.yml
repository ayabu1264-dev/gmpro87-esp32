name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install ESP tools
      run: |
        pip install pyserial esptool

    - name: Install Arduino CLI (Stable)
      run: |
        # Get latest release tag
        VERSION=$(curl -s https://api.github.com/repos/arduino/arduino-cli/releases/latest | grep '"tag_name"' | sed -E 's/.*"v([^"]+)".*/\1/')
        echo "Arduino CLI v$VERSION"
        
        # Download exact filename
        wget "https://github.com/arduino/arduino-cli/releases/download/v${VERSION}/arduino-cli_${VERSION}_Linux_64bit.tar.gz"
        tar xzf arduino-cli_*.tar.gz
        sudo mv arduino-cli /usr/local/bin/
        rm arduino-cli_*.tar.gz
        
        arduino-cli version

    - name: Setup ESP32
      run: |
        arduino-cli config init --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core update-index
        arduino-cli core install esp32:esp32@2.0.17
        arduino-cli board listall esp32:esp32

    - name: Compile
      run: |
        mkdir -p build
        arduino-cli compile \
          --fqbn esp32:esp32:esp32dev \
          --output-dir build \
          --export-binaries \
          ./

    - name: Results
      run: |
        ls -lh build/ || echo "Build dir empty"

    - name: Upload
      uses: actions/upload-artifact@v4
      with:
        name: firmware-v${{ github.run_number }}
        path: build/*.bin
