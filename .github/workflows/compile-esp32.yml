name: Compile ESP32 Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Cache ESP32 tools
      uses: actions/cache@v4
      id: esp32-cache
      with:
        path: |
          ~/.arduino15/packages/esp32
          ~/.cache/arduino
        key: esp32-core-${{ hashFiles('**/*.ino', '**/platform.local.txt') }}

    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install pyserial esptool

    - name: Install Arduino CLI
      uses: arduino/setup-arduino-cli@v1
      with:
        version: latest

    - name: Install ESP32 Board
      run: |
        arduino-cli core update-index --additional-urls https://espressif.github.io/arduino-esp32/package_esp32_index.json
        arduino-cli core install esp32:esp32@2.0.17

    - name: Compile ESP32 Firmware
      run: |
        arduino-cli compile --fqbn esp32:esp32:esp32dev \
          --build-cache-path .arduino_cache \
          --output-dir ./build \
          ./

    - name: Upload Firmware Artifact
      uses: actions/upload-artifact@v4  # ← v4 FIX!
      with:
        name: gmpro87-esp32-firmware
        path: |
          ./build/gmpro87-esp32.ino.esp32.esp32dev.bin
          ./build/gmpro87-esp32.ino.esp32.esp32dev.with_bootloader.bin
        retention-days: 30

    - name: Create Release (on push to main)
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      uses: softprops/action-gh-release@v2
      with:
        files: |
          ./build/gmpro87-esp32.ino.esp32.esp32dev.bin
          ./build/gmpro87-esp32.ino.esp32.esp32dev.with_bootloader.bin
        tag_name: v${{ github.run_number }}
        name: GMpro87 ESP32 v${{ github.run_number }}
        body: |
          ## 🚀 **GMpro87 ESP32 Firmware v${{ github.run_number }}**
          
          ### 📁 **Download Files:**
          
